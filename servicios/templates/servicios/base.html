<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stycheck · Servicios{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fdf6f0; }
        .navbar-stycheck { background-color: #d4587a; }
        .navbar-stycheck .navbar-brand,
        .navbar-stycheck .navbar-text { color: #fff !important; }
        .btn-pink { background-color: #d4587a; border-color: #d4587a; color: #fff; }
        .btn-pink:hover { background-color: #a83458; border-color: #a83458; color: #fff; }
        .card, .table { border-radius: 14px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-stycheck mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'listar_servicios' %}">✦ Stycheck</a>
            <span class="navbar-text">Módulo de Servicios</span>
        </div>
    </nav>

    <div class="container mb-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-3">
        <small>Stycheck · Salón de Belleza · GA7-220501096-AA2-EV01 · Ficha 3235902</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
